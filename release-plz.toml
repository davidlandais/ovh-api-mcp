[workspace]
changelog_update = true

# Determine versions from git tags (not crates.io)
git_only = true

# Create git tags (triggers release.yml)
git_tag_enable = true
git_tag_name = "v{{ version }}"

# Disable: our release.yml handles GitHub releases
git_release_enable = false

# Disable: not publishing to crates.io
publish = false
semver_check = false

# Release PR settings
pr_labels = ["release"]
pr_name = "chore: release v{{ version }}"

[changelog]
header = """# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/),
and this project adheres to [Semantic Versioning](https://semver.org/).

"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim }}
    {% for commit in commits -%}
    - {{ commit.message | upper_first | split(pat="\n") | first }}
    {% endfor -%}
{% endfor %}
"""
trim = true
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^docs", group = "Documentation" },
  { message = "^style", group = "Style" },
  { message = "^refactor", group = "Changed" },
  { message = "^perf", group = "Performance" },
  { message = "^test", group = "Testing" },
  { message = "^chore", group = "Miscellaneous" },
  { message = "^deps", group = "Dependencies" },
  { message = "^security", group = "Security" },
]
